name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-and-services:
    name: Typecheck & build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  contracts:
    name: Foundry tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install forge-std
        working-directory: contracts
        run: |
          git config --global user.email "ci@hoodwire.local"
          git config --global user.name "hoodwire ci"
          forge install foundry-rs/forge-std
      - name: Run tests
        working-directory: contracts
        run: forge test -vvv
